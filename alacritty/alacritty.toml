
[colors]
draw_bold_text_with_bright_colors = true

[cursor]
style = "Block"
unfocused_hollow = true

[env]
TERM = "xterm-256color"

[font]
size = 16.0

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "N"
mods = "Alt"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Alt"

[[keyboard.bindings]]
action = "Quit"
key = "W"
mods = "Alt"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F"
mods = "Alt"

[[keyboard.bindings]]
key = "h"
mode = "Vi"
action = "Left"

[[keyboard.bindings]]
key = "n"
mode = "Vi"
action = "Down"

[[keyboard.bindings]]
key = "e"
mode = "Vi"
action = "Up"

[[keyboard.bindings]]
key = "i"
mode = "Vi"
action = "Right"

[[keyboard.bindings]]
action = "ToggleViMode" 
key = "Space"
mods = "Control|Shift"

[[keyboard.bindings]]
key = "u"
mode = "Vi"
action = "ToggleViMode"

[scrolling]
history = 50000
multiplier = 10

[selection]
save_to_clipboard = true
semantic_escape_chars = "|:\"' {}()[]<>"

[window]
decorations = "none"
opacity = 0.8

[window.padding]
x = 5
y = 5

[general]
live_config_reload = true
import = ["/home/yash/.cache/wal/colors-alacritty.toml"]
