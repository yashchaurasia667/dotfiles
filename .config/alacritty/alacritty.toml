[general]
live_config_reload = true
import = ["colors.toml"]

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
style = "Block"
unfocused_hollow = true

[env]
TERM = "xterm-256color"

[font]
size = 16.0

# [font.bold]
# family = "Maple Mono"
# style = "Bold"
#
# [font.bold_italic]
# family = "Maple Mono"
# style = "Bold Italic"
#
# [font.italic]
# family = "Maple Mono"
# style = "Italic"

[font.normal]
family = "Maple Mono"
style = "Regular"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "N"
mods = "Alt"

[[keyboard.bindings]]
action = "Quit"
key = "Q"
mods = "Alt"

[[keyboard.bindings]]
action = "Quit"
key = "W"
mods = "Alt"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F"
mods = "Alt"

[[keyboard.bindings]]
action = "ToggleViMode" 
key = "Space"
mods = "Control|Shift"

[scrolling]
history = 50000
multiplier = 10

[selection]
save_to_clipboard = true
semantic_escape_chars = "|:\"' {}()[]<>"

[window]
decorations = "none"
opacity = 0.8
blur = true

[window.padding]
x = 5
y = 5

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
