shell=zsh
title=foot
font=Maple Mono:size=16
letter-spacing=0
dpi-aware=no
pad=10x10 center
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
# style=beam
beam-thickness=1.5

[colors-dark]
alpha=0.6

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G

[main]
include=~/.config/foot/theme.ini
