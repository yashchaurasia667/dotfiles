# Hyprland config — ported from SwayFX
# ~/.config/hypr/hyprland.conf

# Pywal colors
source = ~/.cache/wal/colors-hyprland.conf

### Variables
$mainMod = SUPER
$left    = h
$down    = n
$up      = e
$right   = i
$terminal = alacritty
$menu     = rofi -show drun -display-drun ""
env = XCURSOR_THEME, WhiteSur-cursors
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, WhiteSur-cursors
env = HYPRCURSOR_SIZE, 24

### Monitor
monitor = ,preferred,auto,1

### Autostart
exec-once = swww-daemon
exec-once = /usr/lib/pam_kwallet_init
exec-once = kwalletd6
exec-once = swaync
exec-once = waybar
exec-once = wal -R
exec-once = flameshot
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

### Input
input {
    kb_layout    = us
    kb_variant   = colemak
    repeat_delay = 200
    repeat_rate  = 30
    follow_mouse = 1

    cursor {
    }

    touchpad {
        disable_while_typing = true
        tap-to-click         = true
        natural_scroll       = true
        scroll_factor        = 0.2
    }
}

### General
general {
    gaps_in    = 5
    gaps_out   = 10
    border_size = 3

    col.active_border   = $color4
    col.inactive_border = $color0

    layout = dwindle
}

### Decoration (SwayFX eye candy equivalents)
decoration {
    rounding = 5

    blur {
        enabled  = true
        size     = 3
        passes   = 2
        new_optimizations = true
    }

#    drop_shadow       = true
#    shadow_range      = 8
#    shadow_render_power = 3
#    col.shadow        = rgba(1a1a1aee)
}

### Animations
animations {
    enabled = true
    bezier  = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 5, smooth
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border,     1, 8, default
    animation = fade,       1, 5, default
    animation = workspaces, 1, 5, default
}

### Layout
dwindle {
    pseudotile     = true
    preserve_split = true
}

### Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

### Window Rules
# windowrule = size 1280 720, match:float yes
bind = $mainMod, M, exec, ADDR=0x$(hyprctl activewindow | grep 'Window' | awk '{print $2}') && hyprctl dispatch setfloating address:$ADDR && hyprctl dispatch resizewindowpixel exact 1280 720,address:$ADDR && hyprctl dispatch centerwindow
# windowrule = size 1280 720, match:class negative:(xdg-desktop-portal|polkit-gnome|file-roller|pavucontrol|rofi), match:float yes

### Mouse binds (floating_modifier equivalent)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

### Keybindings

# Core
bind = $mainMod,       Return,      exec,           $terminal
bind = $mainMod,       Q,           killactive
bind = ALT,            Space,       exec,           $menu
bind = $mainMod SHIFT, Q,           exec,           wlogout
bind = $mainMod,       L,           exec,           hyprlock

# Waybar / Browser
bind = $mainMod, slash, exec, killall -9 waybar; waybar > /dev/null 2>&1 &
bind = $mainMod, B,     exec, brave

# Focus movement (Colemak home row + arrows)
bind = $mainMod, $left,  movefocus, l
bind = $mainMod, $down,  movefocus, d
bind = $mainMod, $up,    movefocus, u
bind = $mainMod, $right, movefocus, r
bind = $mainMod, left,   movefocus, l
bind = $mainMod, down,   movefocus, d
bind = $mainMod, up,     movefocus, u
bind = $mainMod, right,  movefocus, r

# Move windows
bind = $mainMod SHIFT, $left,  movewindow, l
bind = $mainMod SHIFT, $down,  movewindow, d
bind = $mainMod SHIFT, $up,    movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, left,   movewindow, l
bind = $mainMod SHIFT, down,   movewindow, d
bind = $mainMod SHIFT, up,     movewindow, u
bind = $mainMod SHIFT, right,  movewindow, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move focused window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Layout
bind = $mainMod,       Y, layoutmsg, togglesplit   # splith equivalent
bind = $mainMod,       V, layoutmsg, togglesplit   # splitv equivalent
bind = $mainMod,       T, fullscreen
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod,       Space, togglefloating

# Scratchpad (special workspace)
bind = $mainMod SHIFT, minus, movetoworkspace, special
bind = $mainMod,       minus, togglespecialworkspace

# Resize submap (replaces sway resize mode)
bind = $mainMod, P, submap, resize
submap = resize
binde = , $left,  resizeactive, -10 0
binde = , $down,  resizeactive,   0 10
binde = , $up,    resizeactive,   0 -10
binde = , $right, resizeactive,  10 0
binde = , left,   resizeactive, -10 0
binde = , down,   resizeactive,   0 10
binde = , up,     resizeactive,   0 -10
binde = , right,  resizeactive,  10 0
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# Volume
bindl = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bindl = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+

# Screenshots
bind = ,           Print,        exec, grim
bind = $mainMod SHIFT, S,        exec, flameshot gui

# Media control
bind = $mainMod CTRL, Space, exec, playerctl play-pause
bind = $mainMod CTRL, left,  exec, playerctl previous
bind = $mainMod CTRL, right, exec, playerctl next

# Notification center toggle
bind = $mainMod, slash, exec, swaync-client -t
